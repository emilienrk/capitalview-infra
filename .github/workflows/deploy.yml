name: Infra CD (Deploy Configuration)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Decrypt .env.prod.enc file with SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          docker run --rm \
            -e SOPS_AGE_KEY="${SOPS_AGE_KEY}" \
            -v "$(pwd):/work" \
            -w /work \
            ghcr.io/getsops/sops:v3.11.0-alpine \
            --decrypt --input-type dotenv --output-type dotenv .env.prod.enc > .env

      - name: Copy env and compose files to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: ".env,docker-compose.prod.yaml"
          target: "/home/${{ secrets.VPS_USER }}/capitalview.fr"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/capitalview.fr
            
            chmod 600 .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans
            
            docker image prune -f
